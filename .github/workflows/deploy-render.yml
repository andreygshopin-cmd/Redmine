name: Deploy Render

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Commit SHA to deploy. Leave empty to deploy the workflow commit.
        required: false
        default: ""

jobs:
  deploy:
    name: Trigger Render deploy and verify live SHA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Ensure deploy hook secret is configured
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL}" ]; then
            echo "::error::GitHub secret RENDER_DEPLOY_HOOK_URL is missing."
            exit 1
          fi

      - name: Resolve target commit
        id: target
        shell: bash
        run: |
          TARGET_SHA="${GITHUB_SHA}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.commit_sha }}" ]; then
            TARGET_SHA="${{ inputs.commit_sha }}"
          fi
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent --location \
            --retry 6 \
            --retry-delay 10 \
            --retry-max-time 120 \
            --retry-all-errors \
            -X POST "${RENDER_DEPLOY_HOOK_URL}"

      - name: Wait for expected SHA on health endpoint
        env:
          EXPECTED_COMMIT_SHA: ${{ steps.target.outputs.target_sha }}
          HEALTH_URL: https://redmine-tdfp.onrender.com/health
          TIMEOUT_SECONDS: "1200"
          POLL_INTERVAL_SECONDS: "10"
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen


          def read_env(name: str, default: str = "") -> str:
              return str(os.getenv(name, default) or "").strip()


          def fetch_health(health_url: str) -> dict[str, object]:
              request = Request(health_url, headers={"Accept": "application/json"})
              with urlopen(request, timeout=20) as response:
                  payload = response.read().decode("utf-8", errors="replace")
              return json.loads(payload)


          health_url = read_env("HEALTH_URL", "https://redmine-tdfp.onrender.com/health")
          expected_commit = read_env("EXPECTED_COMMIT_SHA").lower()
          timeout_seconds = int(read_env("TIMEOUT_SECONDS", "1200"))
          poll_interval_seconds = int(read_env("POLL_INTERVAL_SECONDS", "10"))

          if not expected_commit:
              print("EXPECTED_COMMIT_SHA is required", file=sys.stderr)
              raise SystemExit(2)

          deadline = time.time() + timeout_seconds
          last_message = "health endpoint has not responded yet"
          while time.time() < deadline:
              try:
                  payload = fetch_health(health_url)
                  render_commit = str(payload.get("render_git_commit") or "").strip().lower()
                  status = str(payload.get("status") or "").strip().lower()
                  if status == "ok" and render_commit == expected_commit:
                      print(
                          json.dumps(
                              {
                                  "ok": True,
                                  "health_url": health_url,
                                  "expected_commit": expected_commit,
                                  "render_git_commit": render_commit,
                                  "payload": payload,
                              },
                              ensure_ascii=False,
                          )
                      )
                      raise SystemExit(0)
                  last_message = json.dumps(payload, ensure_ascii=False)
              except (HTTPError, URLError, TimeoutError, json.JSONDecodeError) as exc:
                  last_message = str(exc)
              time.sleep(max(1, poll_interval_seconds))

          print(
              json.dumps(
                  {
                      "ok": False,
                      "health_url": health_url,
                      "expected_commit": expected_commit,
                      "last_observation": last_message,
                  },
                  ensure_ascii=False,
              ),
              file=sys.stderr,
          )
          raise SystemExit(1)
          PY

services:
  - type: web
    name: redmine-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.redmine.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: redmine-db
          property: connectionString

databases:
  - name: redmine-db
    plan: basic-256mb

services:
  - type: web
    name: redmine-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.redmine.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: redmine-db
          property: connectionString
      - key: REDMINE_URL
        sync: false
      - key: REDMINE_API_KEY
        sync: false

  - type: cron
    name: redmine-snapshot-cron
    runtime: python
    plan: starter
    schedule: "0 2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.redmine.capture_snapshots
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: redmine-db
          property: connectionString
      - key: REDMINE_URL
        sync: false
      - key: REDMINE_API_KEY
        sync: false

databases:
  - name: redmine-db
    plan: basic-256mb

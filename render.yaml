services:
  - type: web
    name: redmine-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.redmine.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: redmine-db
          property: connectionString
      - key: REDMINE_URL
        sync: false
      - key: REDMINE_API_KEY
        sync: false
      - key: BITRIX_PORTAL_URL
        value: https://sms-it.bitrix24.ru
      - key: Btrx
        sync: false

  # 02:00 Saturday Europe/Samara == 22:00 Friday UTC. Render cron schedules use UTC.
  - type: cron
    name: redmine-bitrix-snapshot-cron
    runtime: python
    plan: starter
    schedule: "0 22 * * FRI"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.redmine.capture_bitrix_snapshots
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: redmine-db
          property: connectionString
      - key: BITRIX_PORTAL_URL
        value: https://sms-it.bitrix24.ru
      - key: Btrx
        sync: false

  # 03:00 Saturday Europe/Samara == 23:00 Friday UTC. Render cron schedules use UTC.
  - type: cron
    name: redmine-snapshot-cron
    runtime: python
    plan: starter
    schedule: "0 23 * * FRI"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.redmine.capture_snapshots
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: redmine-db
          property: connectionString
      - key: REDMINE_URL
        sync: false
      - key: REDMINE_API_KEY
        sync: false

databases:
  - name: redmine-db
    plan: basic-256mb
